<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Converter | Currency Exchange</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <img src="assets/logo.png" controls height="100" width="100">
      <span>CurrencyX</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">🏠 Home</a></li>
      <li><a href="converter.html" class="active">🔄 Converter</a></li>
      <li><a href="details.html">📊 Details</a></li>
      <li><a href="history.html">📜 History</a></li>
      <li><a href="settings.html">⚙️ Settings</a></li>
    </ul>
   
  </nav>

  <!-- Back to Home Button -->
  <div class="back-nav">
    <a href="index.html" class="back-home-btn">← Back to Home</a>
  </div>

  <main class="container">
    <h1>Currency Converter</h1>
    <div class="full-converter">
      <input type="number" id="fullAmount" placeholder="Enter amount" value="100">
      
      <div class="currency-row">
        <label>From:</label>
        <select id="fullFrom" class="currency-select"></select>
        <button id="fullSwapBtn" class="swap-btn">↔️ Swap</button>
        <label>To:</label>
        <select id="fullTo" class="currency-select"></select>
      </div>

      <button id="fullConvertBtn" class="convert-btn">Convert Now</button>

      <div id="fullResult" class="result-card">
        <div class="converted-amount">—</div>
        <div class="exchange-rate">Exchange rate: —</div>
        <div class="timestamp">Last updated: —</div>
      </div>

      <div id="loadingSpinner" class="spinner hidden">⏳ Loading rates...</div>
    </div>
  </main>

  <!-- Footer with navigation -->
  <footer class="footer">
    <div class="footer-nav">
      <a href="index.html">Home</a>
      <a href="converter.html">Converter</a>
      <a href="details.html">Details</a>
      <a href="history.html">History</a>
      <a href="settings.html">Settings</a>
    </div>
    <p class="copy">© 2026 CurrencyX - All Rights Reserved</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
